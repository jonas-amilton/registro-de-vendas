<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Registros</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-5">Registro de Vendas</h1>

      <!-- Formulário de adição de registro -->
      <div class="mb-5">
        <h2>Adicionar Registro</h2>
        <form id="form-registro" class="row g-3">
          <div class="col-md-4">
            <label for="data" class="form-label">Data</label>
            <input type="date" class="form-control" id="data" required />
          </div>
          <div class="col-md-4">
            <label for="valor" class="form-label">Valor</label>
            <input type="number" class="form-control" id="valor" required />
          </div>
          <div class="col-md-4">
            <label for="descricao" class="form-label">Descrição</label>
            <input type="text" class="form-control" id="descricao" required />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Adicionar</button>
          </div>
          <!--toast de confirmação-->
          <div
            class="toast align-items-center text-white bg-success"
            role="alert"
            aria-live="assertive"
            aria-atomic="true"
          >
            <div class="d-flex">
              <div class="toast-body">Registro adicionado com sucesso!</div>
              <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast"
                aria-label="Close"
              ></button>
            </div>
          </div>
        </form>
      </div>

      <!-- Tabela de registros -->
      <div>
        <h2>Registros</h2>
        <div class="mb-3">
          <input
            type="text"
            class="form-control"
            id="filtro-registros"
            placeholder="Filtrar registros..."
          />
        </div>
        <table id="tabela-registros" class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Valor</th>
              <th>Descrição</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Modal de Remoção -->
    <div
      class="modal fade"
      id="modal-remover"
      tabindex="-1"
      role="dialog"
      aria-labelledby="modal-remover-titulo"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-remover-titulo">
              Remover Registro
            </h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Fechar"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p>Você tem certeza que deseja remover este registro?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="btn-remover-confirmar"
            >
              Remover
            </button>
          </div>
        </div>
      </div>
    </div>

    <!--modal do editar-->
    <div
      class="modal fade"
      id="modal-edicao"
      tabindex="-1"
      aria-labelledby="modal-edicao-label"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-edicao-label">Editar Registro</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <form id="form-edicao">
            <div class="modal-body">
              <div class="mb-3">
                <label for="data-edicao" class="form-label">Data</label>
                <input type="date" class="form-control" id="data-edicao" />
              </div>
              <div class="mb-3">
                <label for="valor-edicao" class="form-label">Valor</label>
                <input type="number" class="form-control" id="valor-edicao" />
              </div>
              <div class="mb-3">
                <label for="descricao-edicao" class="form-label"
                  >Descrição</label
                >
                <textarea
                  class="form-control"
                  id="descricao-edicao"
                  rows="3"
                ></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Inclui o JavaScript do Bootstrap e do jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.2/js/bootstrap.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"
      integrity="sha384-iDEe8r3qH2k2c97BnRnBx8KIBWtY/Cd+1/eVN9RGvM8f+oGzDshkOWiII/h1vKp8"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
